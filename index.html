<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Joseph Soares</title>
  <script>
    (function() {
      var saved = localStorage.getItem('jsoares-lang');
      if (saved) { window.location.replace('/' + saved + '/'); return; }
      var lang = (navigator.language || navigator.userLanguage || 'en').toLowerCase();
      if (lang.startsWith('fr')) { window.location.replace('/fr/'); }
      else { window.location.replace('/en/'); }
    })();
  </script>
  <noscript><meta http-equiv="refresh" content="0;url=/en/"></noscript>
</head>
<body>
  <p style="text-align:center;padding:40px;font-family:sans-serif;color:#666;">
    <a href="/en/">English</a> &nbsp;|&nbsp; <a href="/fr/">Français</a>
  </p>
</body>
</html>
